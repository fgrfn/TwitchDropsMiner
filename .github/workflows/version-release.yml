name: Create Version Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (SemVer format, e.g., 1.2.3 or 2.0.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CURRENT_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  create-release-branch:
    name: Create Release Branch
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}
      release_branch: ${{ steps.set_outputs.outputs.release_branch }}

    steps:
      - name: Checkout code
        with:
          fetch-depth: 0

      - name: Extract version
        id: extract
        run: .github/scripts/extract_version.sh

      - name: Validate version format and range
        id: validate
        run: .github/scripts/validate_semver.sh "${{ github.event.inputs.version }}" ">${{ steps.extract.outputs.version }}"

      - name: Check if branch exists
        run: |
          BRANCH_NAME="release/${{ steps.validate.outputs.version }}"

          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "Error: Branch '$BRANCH_NAME' already exists"
            exit 1
          fi

          echo "Branch '$BRANCH_NAME' does not exist, proceeding..."

      - name: Auto-generate release notes if missing (optional)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            .github/scripts/generate_release_notes.sh -v "${{ steps.validate.outputs.version }}" -k "$GEMINI_API_KEY" -p
          else
            echo "GEMINI_API_KEY not set; skipping auto release-notes generation"
          fi

      - name: Create release branch and update version
        run: .github/scripts/create_release.sh "${{ steps.validate.outputs.version }}" "${{ env.CURRENT_BRANCH_NAME }}"

      - name: Set outputs
        id: set_outputs
        run: |
          echo "release_branch=release/${{ steps.validate.outputs.version }}" >> "$GITHUB_OUTPUT"

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: create-release-branch
    environment: prod

    steps:
      - name: Checkout release branch
        with:
          ref: ${{ needs.create-release-branch.outputs.release_branch }}

      - name: Set up QEMU

      - name: Set up Docker Buildx

      - name: Login to GitHub Container Registry
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: docker-tags
        run: |
          VERSION="${{ needs.create-release-branch.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/twitch-drops-miner"
          IS_PRERELEASE="${{ needs.create-release-branch.outputs.is_prerelease }}"

          TAGS="$IMAGE:$VERSION"
          if [ "$IS_PRERELEASE" = "false" ]; then
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            TAGS="$TAGS,$IMAGE:$MAJOR.$MINOR"
            TAGS="$TAGS,$IMAGE:$MAJOR"
            TAGS="$TAGS,$IMAGE:latest"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Twitch Drops Miner
            org.opencontainers.image.description=Automatically mine Twitch drops
            org.opencontainers.image.version=${{ needs.create-release-branch.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-release-branch, docker-build]

    steps:
      - name: Checkout release branch
        with:
          ref: ${{ needs.create-release-branch.outputs.release_branch }}
          fetch-depth: 0

      - name: Extract release notes
        run: .github/scripts/extract_release_notes.sh "${{ needs.create-release-branch.outputs.version }}"

      - name: Create GitHub Release
        with:
          tag_name: v${{ needs.create-release-branch.outputs.version }}
          name: Release ${{ needs.create-release-branch.outputs.version }}
          body_path: release_notes.md
          prerelease: ${{ needs.create-release-branch.outputs.is_prerelease }}
          draft: false
          draft: false
